<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <!-- White background -->
  <rect width="1000" height="1000" fill="white"/>

  <!-- TOP RULE + end ticks + amber center dot -->
  <line x1="80" y1="334" x2="920" y2="334" stroke="#1E3A52" stroke-width="6"/>
  <line x1="80"  y1="316" x2="80"  y2="352" stroke="#1E3A52" stroke-width="6"/>
  <line x1="920" y1="316" x2="920" y2="352" stroke="#1E3A52" stroke-width="6"/>
  <circle cx="500" cy="334" r="15" fill="#C4801C"/>

  <!-- FSC wordmark -->
  <text x="500" y="664"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="420"
        font-weight="700"
        fill="#1E3A52"
        letter-spacing="12">FSC</text>

  <!-- BOTTOM RULE + end ticks -->
  <line x1="80" y1="696" x2="920" y2="696" stroke="#1E3A52" stroke-width="6"/>
  <line x1="80"  y1="678" x2="80"  y2="714" stroke="#1E3A52" stroke-width="6"/>
  <line x1="920" y1="678" x2="920" y2="714" stroke="#1E3A52" stroke-width="6"/>

  <!-- Tagline -->
  <text x="500" y="786"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="38"
        fill="#4A5A6E"
        letter-spacing="8">FLORENCE · SC · SERVICES</text>
</svg>
